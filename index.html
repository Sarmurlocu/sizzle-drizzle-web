<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sizzle & Drizzle | Harvard Medical Student Chef</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; color: #333; background-color: #fafafa; }
        .discount-banner { background: #fff3cd; padding: 20px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #ffeeba; text-align: center; }
        nav h1 { color: #d9534f; text-align: center; font-size: 2.5em; }
        .menu-category { margin-top: 40px; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 15px; }
        .item-card { background: white; border: 1px solid #eee; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .price-tag { font-size: 1.2em; font-weight: bold; color: #d9534f; }
        button { cursor: pointer; background: #007bff; color: white; border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #0056b3; }
        #group-order-summary { background: white; border: 2px dashed #007bff; padding: 25px; border-radius: 15px; margin-top: 40px; }
        #summary-text { background: #f8f9fa; padding: 15px; border: 1px solid #ddd; white-space: pre-wrap; font-family: 'Courier New', monospace; font-size: 1.1em; }
    </style>
</head>
<body>
    <header>
        <div class="discount-banner">
            <p>🎓 <strong>Harvard Affiliate?</strong> Enter @harvard.edu email for 10% off!</p>
            <input type="email" id="user-email" placeholder="yourname@harvard.edu" style="padding: 10px; border-radius: 5px; border: 1px solid #ddd; width: 220px;">
            <button onclick="window.applyDiscount()">Apply Discount</button>
        </div>
        <nav>
            <h1>Sizzle & Drizzle</h1>
        </nav>
    </header>

    <main id="menu-container">
        </main>

    <section id="group-order-summary" style="display:none;">
        <h3>🛒 Group Order Summary</h3>
        <p>Copy this list for your WhatsApp group order:</p>
        <pre id="summary-text"></pre>
        <button onclick="window.copySummary()" style="background: #28a745; width: 100%;">Copy to Clipboard</button>
    </section>

    <footer>
        <p style="text-align: center; color: #999; margin-top: 50px;">© 2026 Sizzle & Drizzle | Designed by Chef Dr. Harvard</p>
    </footer>

    <script type="module" src="js/menu.js"></script>
    <script type="module" src="js/cart.js"></script>
</body>
</html>
